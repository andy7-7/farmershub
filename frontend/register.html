<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FarmersHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Farmers<span>Hub</span></a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div class="page-wrapper">
    <div class="form-wrapper">
      <div class="form-container wide-form">
        <h2>Join the Association</h2>
        <p class="subtitle">Create a verified farmer member account for animal trading.</p>
        <div class="message" id="msg"></div>

        <div class="form-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="full_name" placeholder="Your full name">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="At least 6 characters">
          </div>
          <div class="form-group">
            <label>Farm Name</label>
            <input type="text" id="farm_name" placeholder="e.g. Green Ridge Farms">
          </div>
          <div class="form-group">
            <label>Phone / WhatsApp</label>
            <input type="text" id="phone" placeholder="e.g. 0241234567">
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" placeholder="e.g. Accra, Ghana">
          </div>
          <div class="form-group">
            <label>Region</label>
            <input type="text" id="region" placeholder="e.g. Greater Accra">
          </div>
        </div>
        <div class="form-group">
          <label>Farm Description</label>
          <textarea id="farm_description" placeholder="Tell members about your farm, livestock focus, and trading history."></textarea>
        </div>
        <div class="form-group">
          <label>Association Name</label>
          <input type="text" id="association_name" value="Ghana Farmers Animal Traders Association">
        </div>

        <button class="form-submit" onclick="registerFarmer()">Create Member Account</button>

        <div class="form-link">
          Already a member? <a href="login.html">Sign in here</a>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    updateNav();
    async function registerFarmer() {
      const payload = {
        full_name: document.getElementById('full_name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        farm_name: document.getElementById('farm_name').value,
        phone: document.getElementById('phone').value,
        location: document.getElementById('location').value,
        region: document.getElementById('region').value,
        farm_description: document.getElementById('farm_description').value,
        association_name: document.getElementById('association_name').value
      };
      try {
        await apiFetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        showMessage('msg', 'Application submitted. An admin must approve your account before login.', 'success');
        setTimeout(() => window.location.href = 'login.html', 1800);
      } catch (error) {
        showMessage('msg', error.message, 'error');
      }
    }
  </script>
</body>
</html>
